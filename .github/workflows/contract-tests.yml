name: Contract Tests

on:
  workflow_dispatch:
  push:
    paths:
      - 'REBUSS.Pure/**'
      - 'REBUSS.Pure.Core/**'
      - 'REBUSS.Pure.AzureDevOps/**'
      - 'REBUSS.Pure.GitHub/**'

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build --configuration Release

      - name: Run Protocol Tests (no secrets needed)
        run: >
          dotnet test REBUSS.Pure.SmokeTests
          --configuration Release
          --no-build
          --filter "Category=Protocol"
          --logger "console;verbosity=detailed"

      - name: Run Azure DevOps Contract Tests
        if: env.REBUSS_ADO_PAT != ''
        env:
          REBUSS_ADO_PAT: ${{ secrets.REBUSS_ADO_PAT }}
          REBUSS_ADO_ORG: ${{ secrets.REBUSS_ADO_ORG }}
          REBUSS_ADO_PROJECT: ${{ secrets.REBUSS_ADO_PROJECT }}
          REBUSS_ADO_REPO: ${{ secrets.REBUSS_ADO_REPO }}
          REBUSS_ADO_PR_NUMBER: ${{ secrets.REBUSS_ADO_PR_NUMBER }}
        run: >
          dotnet test REBUSS.Pure.SmokeTests
          --configuration Release
          --no-build
          --filter "Category=ContractAdo"
          --logger "console;verbosity=detailed"

      - name: Run GitHub Contract Tests
        if: env.REBUSS_GH_PAT != ''
        env:
          REBUSS_GH_PAT: ${{ secrets.REBUSS_GH_PAT }}
          REBUSS_GH_OWNER: ${{ secrets.REBUSS_GH_OWNER }}
          REBUSS_GH_REPO: ${{ secrets.REBUSS_GH_REPO }}
          REBUSS_GH_PR_NUMBER: ${{ secrets.REBUSS_GH_PR_NUMBER }}
        run: >
          dotnet test REBUSS.Pure.SmokeTests
          --configuration Release
          --no-build
          --filter "Category=ContractGitHub"
          --logger "console;verbosity=detailed"
